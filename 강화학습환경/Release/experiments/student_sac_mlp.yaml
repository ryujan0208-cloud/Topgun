# Student SAC — 커리큘럼 학습(train_curriculum)용
# 실행:
#   python scripts\run_experiment.py experiments\student_sac_mlp.yaml
# dry-run:
#   python scripts\run_experiment.py experiments\student_sac_mlp.yaml --dry-run

name: student_sac_mlp
script: train_curriculum          # ← 커리큘럼 학습 (진급/단계 지원)

output:
  name: trinity
  tag: stage0_laptop              # 이 노트북 학습 구분용 태그

env:
  observation_mode: tactical16
  target_mode: fixed
  target_behavior_dll: AIP_BASE_target.dll
  reward_module: student.my_reward
  max_engage_time: 60.0
  episode_step_limit: 3600

curriculum:
  stages_module: student.my_curriculum   # ← 반드시 curriculum 섹션 + stages_module

# 세부 환경 설정 (train_curriculum은 my_curriculum의 reward_overrides가 아래 reward를 Stage별로 덮어씀)
env_config:
  step_ratio: 6
  wez:
    angle_deg: 2.0
    min_range_m: 152.4
    max_range_m: 914.4
  target_loiter:
    enabled: true
    bank: 30.0
    pitch: 0.0
  target_autopilot:
    heading_cmd: 180.0
    altitude_cmd: 7000.0
    speed_cmd: 250.0
  reward:
    mode: default
    survival_bonus: 0.0
    step_penalty: -0.01
    pursuit_scale: 0.4
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 4000.0
    positioning_scale: 0.3
    positioning_half_angle_deg: 60.0
    wez_bonus: 2.0
    wez_threat_penalty: 2.0
    low_altitude_penalty: 0.1
    safe_altitude_m: 450.0
    damage_scale: 25.0
    win_reward: 200.0
    loss_reward: -200.0
    draw_reward: -50.0
    guard_fail_penalty: -50.0
  ownship_randomization:
    enabled: true
    radius: 1.0
    r_roll: 5.0
    r_pitch: 5.0
    r_heading: 15.0

algo:
  name: sac
  framework: torch
  lr: 3.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 10000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  # 주의: train_curriculum에서는 iterations가 무시됨 → my_curriculum의 max_iterations가 학습량 결정
  num_env_runners: 1
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 5
  save_native_checkpoint: true
  native_checkpoint_frequency: 25

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: true
  interval: 10
  steps: 4
  print: true

engagement_log:
  enabled: true
  interval: 10
  steps: 3600
  episodes: 5
  print: true

notes: "커리큘럼 학습 - Stage 0 순수 생존 (자동 진급 끔, crash_rate 수동 확인)"
